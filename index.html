<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3bda6" />
  <title>Buddy app — wsparcie na starcie w pracy</title>
  <meta name="description" content="Buddy app — prototyp wsparcia młodych dorosłych rozpoczynających pracę w korporacji. Moduły: Buddy Match, Know-How, Jasne Oczekiwania." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Górny pasek -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.4 5.4l1.7 1.7M16.9 16.9l1.7 1.7M18.6 5.4l-1.7 1.7M7.1 16.9l-1.7 1.7"/></svg></span>
        <div class="brand-text">
          <strong>Buddy app</strong>
          <span class="brand-sub">Twoje wsparcie na starcie</span>
        </div>
      </div>
      <button id="resetBtn" class="ghost-btn" type="button" title="Wyczyść dane demo">Reset demo</button>
    </header>

    <!-- Główny widok (renderowany przez JS) -->
    <main id="view" class="view" tabindex="-1">
      <noscript>
        <p style="padding:24px">Ta aplikacja wymaga włączonego JavaScriptu.</p>
      </noscript>
    </main>

    <!-- Dolna nawigacja -->
    <nav class="tabbar" aria-label="Nawigacja główna">
      <a class="tab" href="#start" data-route="start"><span class="tab-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3.2 11.8 12 4l8.8 7.8"/><path d="M5.2 10.3V19a1 1 0 0 0 1 1h11.6a1 1 0 0 0 1-1v-8.7"/><path d="M9.8 20v-5.2h4.4V20"/></svg></span><span class="tab-lbl">Start</span></a>
      <a class="tab" href="#buddy" data-route="buddy"><span class="tab-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8.5" r="3.1"/><path d="M3.4 19a5.6 5.6 0 0 1 11.2 0"/><path d="M15.8 5.7a3 3 0 0 1 0 5.6"/><path d="M17 13.4a5.6 5.6 0 0 1 3.6 5.2"/></svg></span><span class="tab-lbl">Buddy</span></a>
      <a class="tab" href="#knowhow" data-route="knowhow"><span class="tab-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4.6A1.6 1.6 0 0 1 6.6 3H19v14.5H6.6A1.6 1.6 0 0 0 5 19z"/><path d="M5 19a1.6 1.6 0 0 0 1.6 1.5H19"/><path d="M9 7.5h6M9 10.5h5"/></svg></span><span class="tab-lbl">Know-How</span></a>
      <a class="tab" href="#expectations" data-route="expectations"><span class="tab-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4.4"/><circle cx="12" cy="12" r="1"/></svg></span><span class="tab-lbl">Oczekiwania</span></a>
      <a class="tab" href="#week" data-route="week"><span class="tab-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.2C7.6 17 4 14 4 10.4 4 8 5.9 6.2 8.2 6.2c1.5 0 2.9.8 3.8 2 .9-1.2 2.3-2 3.8-2C20.1 6.2 22 8 22 10.4c0 3.6-3.6 6.6-8 9.8z"/></svg></span><span class="tab-lbl">Tydzień</span></a>
    </nav>
  </div>

  <!-- Dane treściowe, potem logika. Klasyczne skrypty (bez modułów/fetch),
       żeby działało też po otwarciu pliku z dysku (file://). -->
  <script src="icons.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
